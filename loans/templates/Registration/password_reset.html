{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    'loan-dark': '#06262d',
                }
            }
        }
    }
    </script>

    {% tailwind_css %}
</head>

<body class="min-h-screen flex items-center justify-center bg-[#06262d] px-4">

    <div class="text-white w-full max-w-md rounded-lg overflow-hidden shadow-xl">

        <!-- Header -->
        <div class="bg-amber-800/45 py-4">
            <h2 class="text-2xl font-bold text-center tracking-wide">
                RESET PASSWORD
            </h2>
        </div>

        <!-- Body -->
        <div class="p-8 bg-gray-600 space-y-6">

            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <!-- Email Field -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">
                        ENTER YOUR REGISTERED EMAIL
                    </label>

                    <input type="email"
                        name="email"
                        value="{{ form.email.value|default_if_none:'' }}"
                        required
                        class="w-full px-3 py-2 rounded-md bg-gray-700 text-white
                                border border-gray-500 focus:outline-none
                                focus:ring-2 focus:ring-amber-500">

                    {% if form.email.errors %}
                        <p class="text-red-400 text-sm mt-1">
                            {{ form.email.errors.0 }}
                        </p>
                    {% endif %}
                </div>

                <!-- Button -->
                <button type="submit"
                    class="w-full border border-white
                           bg-transparent hover:bg-amber-950/95
                           text-white font-semibold py-2 rounded-md
                           transition duration-300">
                    SEND RESET LINK
                </button>

            </form>

            <!-- Back to Login -->
            <p class="text-center text-sm text-white/80">
                Remember your password?
                <a href="{% url 'login' %}"
                   class="text-amber-400 hover:text-amber-300 transition">
                    Back to Login
                </a>
            </p>

        </div>
    </div>

</body>
</html>
