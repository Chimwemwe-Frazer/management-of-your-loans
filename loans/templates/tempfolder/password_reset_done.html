{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    'loan-dark': '#06262d',
                }
            }
        }
    }
    </script>

    {% tailwind_css %}
</head>

<body class="min-h-screen flex items-center justify-center bg-[#06262d] px-4">

    <div class="text-white w-full max-w-md rounded-lg overflow-hidden shadow-xl">

        <!-- Header -->
        <div class="bg-amber-800/45 py-4">
            <h2 class="text-2xl font-bold text-center tracking-wide">
                CHECK YOUR EMAIL
            </h2>
        </div>

        <!-- Body -->
        <div class="p-8 bg-gray-600 space-y-6 text-sm leading-relaxed text-center">

            <p>
                If an account exists with the email you entered,
                you will receive a password reset link shortly.
            </p>

            <!-- Back to Login -->
            <a href="{% url 'login' %}"
               class="inline-block border border-white
                      bg-transparent hover:bg-amber-950/95
                      text-white font-semibold py-2 px-6 rounded-md
                      transition duration-300">
                BACK TO LOGIN
            </a>

        </div>
    </div>

</body>
</html>
