{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    'loan-dark': '#06262d',
                }
            }
        }
    }
    </script>

    {% tailwind_css %}
</head>

<body class="min-h-screen flex items-center justify-center bg-[#06262d] px-4">

    <div class="text-white w-full max-w-md rounded-lg overflow-hidden shadow-xl">

        <!-- Header -->
        <div class="bg-amber-800/45 py-4">
            <h2 class="text-2xl font-bold text-center tracking-wide mt-2">
                CREATE ACCOUNT
            </h2>
        </div>

        <!-- Body -->
        <div class="p-8 bg-gray-600 space-y-6">

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">
                        USERNAME (No spaces allowed)
                    </label>
                    <input type="text" name="username"
                        placeholder="e.g. Chimwemwe_Frazer"
                        required
                        class="w-full px-3 py-2 rounded-md bg-gray-700 text-white
                               border border-gray-500 focus:outline-none
                               focus:ring-2 focus:ring-amber-500">
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">
                        EMAIL ADDRESS (Required for password recovery)
                    </label>
                    <input type="email" name="email"
                        required
                        class="w-full px-3 py-2 rounded-md bg-gray-700 text-white
                               border border-gray-500 focus:outline-none
                               focus:ring-2 focus:ring-amber-500">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">
                        PASSWORD
                    </label>
                    <input type="password" name="password"
                        required
                        class="w-full px-3 py-2 rounded-md bg-gray-700 text-white
                               border border-gray-500 focus:outline-none
                               focus:ring-2 focus:ring-amber-500">
                </div>

                <hr class="border-gray-500">

                <!-- Full Name -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">
                        FULL NAME
                    </label>
                    <input type="text" name="name"
                        required
                        class="w-full px-3 py-2 rounded-md bg-gray-700 text-white
                               border border-gray-500 focus:outline-none
                               focus:ring-2 focus:ring-amber-500">
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">
                        PHONE
                    </label>
                    <input type="text" name="phone"
                        required
                        class="w-full px-3 py-2 rounded-md bg-gray-700 text-white
                               border border-gray-500 focus:outline-none
                               focus:ring-2 focus:ring-amber-500">
                </div>

                <!-- Address -->
                <div>
                    <label class="block text-sm font-medium text-white mb-2">
                        ADDRESS
                    </label>
                    <textarea name="address" rows="3"
                        class="w-full px-3 py-2 rounded-md bg-gray-700 text-white
                               border border-gray-500 focus:outline-none
                               focus:ring-2 focus:ring-amber-500"></textarea>
                </div>

                <!-- Button -->
                <button type="submit"
                    class="w-full border border-white
                           bg-transparent hover:bg-amber-950/95
                           text-white font-semibold py-2 rounded-md
                           transition duration-300">
                    REGISTER
                </button>

            </form>

            <!-- Login Link -->
            <p class="text-center text-sm text-white/80">
                Already have an account?
                <a href="{% url 'login' %}"
                   class="text-amber-400 hover:text-amber-300 transition">
                    Login
                </a>
            </p>

        </div>
    </div>

</body>
</html>
