<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>
    <h2>Create an Account</h2>

    <form method="post">
        {% csrf_token %}

        <label>Username (No spaces allowed):</label><br>
        <input type="text" name="username" placeholder="e.g. Adonis_Frazer" required><br><br>

        <label>Email Address (Required for password recovery):</label><br>
        <input type="email" name="email" required><br><br>

        <label>Password:</label><br>
        <input type="password" name="password" required><br><br>

        <hr> <label>Full Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Phone:</label><br>
        <input type="text" name="phone" required><br><br>

        <label>Address:</label><br>
        <textarea name="address"></textarea><br><br>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account?  
        <a href="{% url 'login' %}">Login</a>
    </p>
</body>
</html>
