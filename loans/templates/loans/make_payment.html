{% extends "base.html" %}

{% block content %}

    <h1>Make Payment</h1>

    <form method="post">
        {% csrf_token %}
        <label>
            Loan Amount Remaining: {{ loan.remaining_balance }}
        </label>
        <br><br>
        <label>Payment Amount:</label>
        <input type="number" name="amount" step="500" required><br><br>
        <button type="submit">Submit Payment</button>
    </form>
{% endblock %}
