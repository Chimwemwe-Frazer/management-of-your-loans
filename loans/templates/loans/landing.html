{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Welcome for loans</title>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        {% tailwind_css %}

    </head>
    <body class="min-h-screen relative flex items-center justify-center font-[Roboto]">
        <!-- Background Image -->
        <div class="absolute inset-0">
            <img src="{% static 'images/landing.jpg' %}" 
                class="w-full h-full object-cover"
                alt="Background">
        </div>

        <!-- Dark Overlay -->
        <div class="absolute inset-0 bg-black/77"></div>

    <div class="relative text-white text-center">

        <h1 class="text-3xl md:text-4xl font-bold mb-6 mr-2 ml-2">WELCOME TO LOAN MANAGEMENT SYSTEM</h1>

        <p class="text-xl mb-5">Please log in or create an account to apply for a loan.</p>
        <section class="flex flex-row items-center justify-center gap-3">
        <a href="{% url 'login' %}" class="btn btn-info text-gray-500 transition-all duration-1000 ease-in-out hover:scale-105">Login</a>
        <a href="{% url 'register' %}" class="btn btn-primary mx-3 transition-all duration-1000 ease-in-out hover:scale-105">Create Account</a>
        </section>

    </div>   
    </body>
</html>
