{% load static %}
{% load tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome for loans</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    {% tailwind_css %}
</head>
<body class="min-h-screen relative flex items-center justify-center font-[Roboto]">

    <!-- Background Image -->
    <div class="absolute inset-0">
        <img src="{% static 'images/landing.jpg' %}" 
             class="w-full h-full object-cover"
             alt="Background">
    </div>

    <!-- Dark Overlay -->
    <div class="absolute inset-0 bg-black/77"></div>

    <!-- Content -->
    <div class="relative text-white text-center px-4 sm:px-6 lg:px-8">

        <h1 class="text-2xl sm:text-3xl md:text-4xl lg:text-5xl font-bold mb-4 sm:mb-6 px-2">
            WELCOME TO LOAN MANAGEMENT SYSTEM
        </h1>

        <p class="text-lg sm:text-xl md:text-2xl mb-6 px-2">
            Please log in or create an account to apply for a loan.
        </p>

        <section class="flex flex-row sm:flex-row items-center justify-center gap-4 sm:gap-6">
            <!-- <a href="{% url 'login' %}" 
               class="px-6 py-3 sm:px-8 sm:py-3 bg-cyan-400 text-gray-900 font-semibold rounded-full shadow-lg transition-all duration-300 hover:scale-105 hover:bg-cyan-500 w-full sm:w-auto text-center">
                Login
            </a> -->
            <a href="{% url 'login' %}" 
               class="btn btn-info w-1/4 sm:w-auto transition-all duration-300 hover:scale-105 text-gray-700">
                Login
            </a>
            <!-- <a href="{% url 'register' %}" 
               class="px-6 py-3 sm:px-8 sm:py-3 bg-amber-600 text-white font-semibold rounded-full shadow-lg transition-all duration-300 hover:scale-105 hover:bg-amber-700 w-full sm:w-auto text-center">
                Create Account
            </a> -->
             <a href="{% url 'register' %}" 
               class="btn btn-primary w-1/4 sm:w-auto transition-all duration-300 hover:scale-105">
                Create Account
            </a>
        </section>

    </div>   
</body>
</html>
