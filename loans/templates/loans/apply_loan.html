{% extends "base.html" %}

{% block content %}
    <h2>Apply for a Loan</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

            <label>Loan Amount</label>
            <input type="number" name="amount" required>

        {% if not has_previous_loan %}
            <hr>
            <h4>Required for First Loan Only</h4>

            <label>Upload National ID</label>
            <input type="file" name="national_id_image" accept="image/*" required>
            <br>

            <label>Upload Residence Map</label>
            <input type="file" name="residence_map_image" accept="image/*" required>
        {% endif %}
            <br>

            <button type="submit">Apply for Loan</button>
    </form>

    <br>
    <a href="{% url 'loan_list' %}">Back to My Loans</a>
{% endblock %}
